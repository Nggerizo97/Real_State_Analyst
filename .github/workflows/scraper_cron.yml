name: Daily Real Estate Scraper

on:
  schedule:
    - cron: '0 1 * * 0,3'
  workflow_dispatch:

jobs:
  scrape:
    name: "Scrape ${{ matrix.scraper }}"
    runs-on: ubuntu-22.04
    timeout-minutes: 90  # Fix 5: evita runners zombies
    strategy:
      fail-fast: false
      matrix:
        include:
          - scraper: bancolombia
            pages: 999
          - scraper: fincaraiz
            pages: 999
          - scraper: mercadolibre
            pages: 999
          - scraper: metrocuadrado
            pages: 999
          - scraper: ciencuadras_nuevo
            pages: 999
          - scraper: ciencuadras_usado
            pages: 999
          - scraper: properati
            pages: 999

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Fix 4: cachear Playwright para no descargar 300MB en cada job
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Install Playwright system deps (always)
        run: playwright install-deps chromium

      - name: Setup Cloudflare WARP
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
            | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] \
            https://pkg.cloudflareclient.com/ jammy main" \
            | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update -q && sudo apt-get install -y cloudflare-warp
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect

      # Fix 3: health-check loop — no empieza hasta que WARP responde
      - name: Wait for WARP proxy to be ready
        run: |
          echo "Waiting for WARP proxy on socks5://127.0.0.1:40000..."
          for i in $(seq 1 12); do
            if curl -s --max-time 3 --proxy socks5h://127.0.0.1:40000 https://cloudflare.com/cdn-cgi/trace \
              | grep -q "warp=on"; then
              echo "✅ WARP active after ${i}s"
              break
            fi
            if [ "$i" -eq 12 ]; then
              echo "⚠️ WARP not confirmed after 60s — proceeding without proxy guarantee"
            fi
            sleep 5
          done

      - name: "Run scraper: ${{ matrix.scraper }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          PROXY_URL: "socks5://127.0.0.1:40000"
        run: |
          python scripts/run_${{ matrix.scraper }}.py --pages ${{ matrix.pages }} 2>&1 \
            | tee /tmp/scraper_${{ matrix.scraper }}.log
          echo "EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV

      # Fix 6: resumen de resultados — cuántos registros subió cada scraper
      - name: Scraper summary
        if: always()
        run: |
          LOG="/tmp/scraper_${{ matrix.scraper }}.log"
          echo "=== Summary: ${{ matrix.scraper }} ==="
          if [ -f "$LOG" ]; then
            # Usar wc -l para evitar el doble eco de 'grep -c || echo 0'
            NEW=$(grep "\[NEW\]" "$LOG" | wc -l)
            SKIP=$(grep "\[SKIP\]" "$LOG" | wc -l)
            PAGES=$(grep "Página [0-9]*/[0-9]*" "$LOG" | tail -1 || echo "—")
            echo "NEW_RECORDS=$NEW" >> $GITHUB_ENV
            echo "New/updated records : $NEW"
            echo "Skipped (no change) : $SKIP"
            echo "Last page log       : $PAGES"
          else
            echo "NEW_RECORDS=0" >> $GITHUB_ENV
            echo "No log file found."
          fi

      # Fix 7: Notificación de fallo o inactividad
      - name: Notify on failure or zero results
        if: always()
        run: |
          EXIT_CODE=${{ env.EXIT_CODE || 0 }}
          NEW_RECORDS=${{ env.NEW_RECORDS || 0 }}
          
          if [ "$EXIT_CODE" -ne 0 ] || [ "$NEW_RECORDS" -eq 0 ]; then
            MESSAGE="⚠️ Alerta Scraper: ${{ matrix.scraper }}\n- Status: $( [ "$EXIT_CODE" -eq 0 ] && echo "Success" || echo "FAILED" )\n- Nuevos Registros: $NEW_RECORDS\n- Revisa: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "Enviando alerta: $MESSAGE"
            # Placeholder para curl a Slack/Discord/Email
            # curl -X POST -H 'Content-type: application/json' --data "{\"text\":\"$MESSAGE\"}" ${{ secrets.SLACK_WEBHOOK }}
          fi

  trigger-etl:
    name: Trigger Databricks ETL
    needs: scrape
    # Fix 1: corre si al menos un scraper terminó (success o failure), pero NO si fue cancelado
    if: ${{ needs.scrape.result != 'cancelled' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Trigger Databricks ETL Job
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          JOB_ID: ${{ secrets.DATABRICKS_JOB_ID }}
        run: |
          HOST="${DATABRICKS_HOST%/}"
          if [[ ! "$HOST" =~ ^https?:// ]]; then
            HOST="https://$HOST"
          fi
          echo "Triggering Databricks Job $JOB_ID at $HOST..."

          # Fix 2: retry + timeout + validación de respuesta vacía
          RESPONSE=$(curl -s \
            --retry 3 \
            --retry-delay 5 \
            --connect-timeout 20 \
            --max-time 60 \
            -w "\n%{http_code}" \
            -X POST \
            "${HOST}/api/2.1/jobs/run-now" \
            -H "Authorization: Bearer ${DATABRICKS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"job_id\": $JOB_ID}") || true

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          if [ -z "$HTTP_CODE" ]; then
            echo "❌ curl failed — no response (network error or timeout)"
            exit 1
          elif [ "$HTTP_CODE" -eq 200 ]; then
            RUN_ID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('run_id','?'))" 2>/dev/null || echo "?")
            echo "✅ Databricks Job started — run_id: $RUN_ID"
          else
            echo "❌ Databricks API returned HTTP $HTTP_CODE"
            echo "Response body: $BODY"
            exit 1
          fi
