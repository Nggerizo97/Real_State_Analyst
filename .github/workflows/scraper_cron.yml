name: Daily Real Estate Scraper

on:
  schedule:
    # Executes at 01:00 UTC on Sunday and Wednesday
    - cron: '0 1 * * 0,3'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  scrape-and-upload:
    name: Playwright Scraping
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' 
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Install Playwright Browsers
        run: |
          playwright install chromium --with-deps
          
      - name: Run Modular Data Ingestion
        # Usamos los secrets del repositorio de manera super segura 
        # python-dotenv NO leerá un .env porque no existe en la Action, 
        # leerá estas variables de entorno de OS que pasamos aquí
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          echo "Starting Real Estate Scalable Pipeline..."
          python main.py
          echo "Pipeline finished."

      - name: Trigger Databricks ETL Job
        if: success()
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          JOB_ID: ${{ secrets.DATABRICKS_JOB_ID }}
        run: |
          echo "🚀 Triggering Databricks Job ID: $JOB_ID..."
          
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "${DATABRICKS_HOST}/api/2.1/jobs/run-now" \
            -H "Authorization: Bearer ${DATABRICKS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"job_id\": $JOB_ID}")
          
          if [ "$response" -eq 200 ]; then
            echo "✅ Databricks Job started successfully!"
          else
            echo "❌ Failed to start Databricks Job. HTTP Status: $response"
            exit 1
          fi
