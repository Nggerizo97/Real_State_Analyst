# docker-compose.yml
# Levanta la API FastAPI + el frontend Streamlit en contenedores separados.
#
# ─── Desarrollo local ─────────────────────────────────────────────────────────
#   docker-compose up --build
#
# ─── Producción (ECR) ────────────────────────────────────────────────────────
#   Definir en .env (o en el shell del servidor):
#     ECR_REGISTRY=<account>.dkr.ecr.<region>.amazonaws.com
#     IMAGE_TAG=<short-sha>          # o "latest"
#   Luego:
#     aws ecr get-login-password | docker login --username AWS --password-stdin $ECR_REGISTRY
#     docker-compose pull && docker-compose up -d
#
# ─── Variables de entorno requeridas en .env ─────────────────────────────────
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION, S3_BUCKET
#   ECR_REGISTRY   (sólo producción)
#   IMAGE_TAG      (opcional; default: latest)

version: "3.9"

x-ecr-api: &ecr-api
  # En producción IMAGE_TAG=<sha> y ECR_REGISTRY=<account>.dkr.ecr.<region>.amazonaws.com
  # En local la línea 'image:' es ignorada porque 'build:' tiene precedencia al hacer --build
  image: ${ECR_REGISTRY:-local}/rea-api:${IMAGE_TAG:-latest}

x-ecr-streamlit: &ecr-streamlit
  image: ${ECR_REGISTRY:-local}/rea-streamlit:${IMAGE_TAG:-latest}

services:
  # ─── Backend API ────────────────────────────────────────────────────────────
  api:
    <<: *ecr-api
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: rea_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   # tiempo para que el modelo cargue desde S3
    restart: unless-stopped

  # ─── Frontend Streamlit ─────────────────────────────────────────────────────
  streamlit:
    <<: *ecr-streamlit
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rea_streamlit
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      # Apuntar al servicio API interno (nombre del servicio Docker)
      - REA_API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: rea_network
