name: Daily Real Estate Scraper

on:
  schedule:
    # Dos runs por día — cada uno raspa 200 páginas y continúa desde checkpoint
    # Run 1: 01:00 UTC (raspa páginas 1-200 o continúa desde checkpoint)
    # Run 2: 07:00 UTC (continúa desde donde quedó el Run 1)
    - cron: '0 1 * * *'
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      pages:
        description: 'Páginas por scraper (default: 200)'
        required: false
        default: '200'
      clear_checkpoints:
        description: 'Limpiar checkpoints y empezar desde página 1 (true/false)'
        required: false
        default: 'false'

jobs:
  scrape:
    name: "Scrape ${{ matrix.scraper }}"
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    if: always()
    strategy:
      fail-fast: false
      matrix:
        include:
          - scraper: bancolombia
            pages: 200
          - scraper: fincaraiz
            pages: 200
          - scraper: mercadolibre
            pages: 200
          - scraper: metrocuadrado
            pages: 200
          - scraper: ciencuadras_nuevo
            pages: 200
          - scraper: ciencuadras_usado
            pages: 200
          - scraper: properati
            pages: 200

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: "Clear specific checkpoint (if requested)"
        if: ${{ github.event.inputs.clear_checkpoints == 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          python - <<'EOF'
          import boto3, os
          s3 = boto3.client('s3')
          bucket = os.environ['S3_BUCKET_NAME']
          key = f"checkpoints/${{ matrix.scraper }}.json"
          try:
              s3.delete_object(Bucket=bucket, Key=key)
              print(f"Deleted checkpoint: {key}")
          except s3.exceptions.NoSuchKey:
              print(f"No checkpoint found for: {key}")
          except Exception as e:
              print(f"Error clearing checkpoint: {e}")
          EOF

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-scraper.txt
          pip install playwright

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('requirements-scraper.txt') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Install Playwright system deps (always)
        run: playwright install-deps chromium

      - name: Setup Cloudflare WARP
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
            | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] \
            https://pkg.cloudflareclient.com/ jammy main" \
            | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update -q && sudo apt-get install -y cloudflare-warp
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect

      - name: Wait for WARP proxy to be ready
        run: |
          for i in $(seq 1 12); do
            if curl -s --max-time 3 --proxy socks5h://127.0.0.1:40000 \
              https://cloudflare.com/cdn-cgi/trace | grep -q "warp=on"; then
              echo "✅ WARP active after $((i*5))s"
              break
            fi
            [ "$i" -eq 12 ] && echo "⚠️ WARP not confirmed after 60s — proceeding"
            sleep 5
          done

      - name: "Run scraper: ${{ matrix.scraper }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          PROXY_URL: "socks5://127.0.0.1:40000"
        run: |
          PAGES=${{ github.event.inputs.pages || matrix.pages }}
          echo "Starting ${{ matrix.scraper }} (max_pages=$PAGES)..."
          python scripts/run_${{ matrix.scraper }}.py --pages $PAGES 2>&1 \
            | tee /tmp/scraper_${{ matrix.scraper }}.log
          echo "SCRAPER_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Scraper summary
        if: always()
        run: |
          LOG="/tmp/scraper_${{ matrix.scraper }}.log"
          if [ -f "$LOG" ]; then
            # El flag -c de grep retorna 0 si hay coincidencias, 1 si no hay (pero imprime '0').
            # Usamos '|| true' para capturar ese '0' sin que el subshell falle.
            NEW=$(grep -c "\[NEW\]" "$LOG" || true)
            SKIP=$(grep -c "\[SKIP\]" "$LOG" || true)
            CHECKPOINT=$(grep "Checkpoint guardado" "$LOG" | tail -1 || echo "—")
            
            echo "NEW_RECORDS=$NEW" >> "$GITHUB_ENV"
            
            echo "=== ${{ matrix.scraper }} summary ==="
            echo "New/updated : $NEW"
            echo "Skipped     : $SKIP"
            echo "Checkpoint  : $CHECKPOINT"
          else
            echo "NEW_RECORDS=0" >> "$GITHUB_ENV"
          fi

      - name: Notify on failure or zero results
        if: always()
        run: |
          EXIT=${{ env.SCRAPER_EXIT || 0 }}
          NEW=${{ env.NEW_RECORDS || 0 }}
          if [ "$EXIT" -ne 0 ] || [ "$NEW" -eq 0 ]; then
            MSG="⚠️ Scraper ${{ matrix.scraper }} | status=$([ $EXIT -eq 0 ] && echo OK || echo FAILED) | nuevos=$NEW | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "$MSG"
            # curl -X POST -d "{\"text\":\"$MSG\"}" ${{ secrets.SLACK_WEBHOOK }}
          fi

  trigger-etl:
    name: Trigger Databricks ETL
    needs: scrape
    if: ${{ needs.scrape.result != 'cancelled' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Trigger Databricks ETL Job
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          JOB_ID: ${{ secrets.DATABRICKS_JOB_ID }}
        run: |
          HOST="${DATABRICKS_HOST%/}"
          [[ ! "$HOST" =~ ^https?:// ]] && HOST="https://$HOST"

          RESPONSE=$(curl -s --retry 3 --retry-delay 5 \
            --connect-timeout 20 --max-time 60 \
            -w "\n%{http_code}" -X POST \
            "${HOST}/api/2.1/jobs/run-now" \
            -H "Authorization: Bearer ${DATABRICKS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"job_id\": $JOB_ID}") || true

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          if [ -z "$HTTP_CODE" ]; then
            echo "❌ curl failed — no response"; exit 1
          elif [ "$HTTP_CODE" -eq 200 ]; then
            RUN_ID=$(echo "$BODY" | python3 -c \
              "import sys,json; print(json.load(sys.stdin).get('run_id','?'))" 2>/dev/null || echo "?")
            echo "✅ Databricks Job started — run_id: $RUN_ID"
          else
            echo "❌ HTTP $HTTP_CODE — $BODY"; exit 1
          fi
